<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SlideFlipper Install</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    main { width: 100%; max-width: 480px; text-align: center; }
    h1 { font-size: 28px; margin-bottom: 10px; }
    p { color: #8b949e; font-size: 16px; margin-bottom: 36px; line-height: 1.5; }
    .grid { display: flex; flex-direction: column; gap: 16px; }
    a {
      display: block;
      padding: 20px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      transition: opacity .15s;
    }
    a:active { opacity: .8; }
    .mac { background: #238636; color: #fff; }
    .win { background: #0078d4; color: #fff; }
    .sub { display: block; font-size: 13px; font-weight: 400; opacity: .8; margin-top: 4px; }
  </style>
</head>
<body>
  <main>
    <h1>🖱 SlideFlipper</h1>
    <p>Install the PC controller to use your Amazfit watch as a presentation remote.</p>
    <div class="grid">
      <a class="mac" href="mac/">
        Mac
        <span class="sub">macOS — Terminal install</span>
      </a>
      <a class="win" href="win/">
        Windows
        <span class="sub">Windows — PowerShell install</span>
      </a>
    </div>
  </main>
</body>
</html>
