name: Build & Release SlideFlipper App

on:
  push:
    tags:
      - 'v*'          # triggers on: git tag v1.0.0 && git push --tags
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── macOS ────────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: slide-flipper/pc-controller-electron/package.json

      - name: Install dependencies
        working-directory: slide-flipper/pc-controller-electron
        run: npm install

      - name: Build Mac DMG (arm64 + x64)
        working-directory: slide-flipper/pc-controller-electron
        run: npx electron-builder --mac --arm64 --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false   # skip code signing

      - name: Upload Mac DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: slide-flipper/pc-controller-electron/dist/*.dmg
          if-no-files-found: error

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-win:
    name: Build Windows (.exe installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: slide-flipper/pc-controller-electron/package.json

      - name: Install dependencies
        working-directory: slide-flipper/pc-controller-electron
        run: npm install

      - name: Build Windows NSIS installer
        working-directory: slide-flipper/pc-controller-electron
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: slide-flipper/pc-controller-electron/dist/*.exe
          if-no-files-found: error

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: dist/

      - name: List release files
        run: ls -lh dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'v1.0.0' }}
          name: "SlideFlipper ${{ github.ref_name || 'v1.0.0' }}"
          body: |
            ## SlideFlipper — PC Controller App

            Use your Amazfit Bip 6 as a wireless presentation remote.

            ### Download
            | Platform | File |
            |----------|------|
            | **Mac** (Apple Silicon + Intel) | `SlideFlipper-*.dmg` |
            | **Windows** (64-bit) | `SlideFlipper-Setup-*.exe` |

            ### How to install
            1. Download the file for your platform above.
            2. **Mac**: Open the `.dmg`, drag SlideFlipper to Applications, double-click to run.
            3. **Windows**: Run the `.exe` installer, then launch SlideFlipper from the Start Menu.
            4. The app runs silently in your menu bar / system tray.
            5. Click the icon to see your IP address, then enter it in the watch's **IP SETUP** screen.
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
