name: Build & Release SlideFlipper App

on:
  push:
    tags:
      - 'v*'          # triggers on: git tag v1.0.0 && git push --tags
  workflow_dispatch:  # allows manual trigger from GitHub Actions tab

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  # ── macOS Apple Silicon ─────────────────────────────────────────────────────
  build-mac-arm64:
    name: Build macOS Apple Silicon (.dmg)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: slide-flipper/pc-controller-electron/package.json

      - name: Install dependencies
        working-directory: slide-flipper/pc-controller-electron
        run: npm install

      - name: Build Mac DMG (arm64)
        working-directory: slide-flipper/pc-controller-electron
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false   # skip code signing

      - name: Upload Mac arm64 DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-dmg-arm64
          path: slide-flipper/pc-controller-electron/dist/SlideFlipper-Mac-arm64.dmg
          if-no-files-found: error

  build-lite-mac-arm64:
    name: Build Lite macOS Apple Silicon
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: slide-flipper/pc-controller-lite/package.json

      - name: Install Lite dependencies
        working-directory: slide-flipper/pc-controller-lite
        run: npm install

      - name: Build Lite Mac binary
        working-directory: slide-flipper/pc-controller-lite
        run: npm run build:mac

      - name: Zip Lite Mac binary
        working-directory: slide-flipper/pc-controller-lite/dist
        run: zip -j SlideFlipper-Lite-mac-arm64.zip SlideFlipper-Lite-mac-arm64

      - name: Upload Lite Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-lite-arm64
          path: slide-flipper/pc-controller-lite/dist/SlideFlipper-Lite-mac-arm64.zip
          if-no-files-found: error

  # ── Windows ──────────────────────────────────────────────────────────────────
  build-win:
    name: Build Windows (.exe installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: slide-flipper/pc-controller-electron/package.json

      - name: Install dependencies
        working-directory: slide-flipper/pc-controller-electron
        run: npm install

      - name: Build Windows NSIS installer
        working-directory: slide-flipper/pc-controller-electron
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-installer
          path: slide-flipper/pc-controller-electron/dist/*.exe
          if-no-files-found: error

  build-lite-win:
    name: Build Lite Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: slide-flipper/pc-controller-lite/package.json

      - name: Install Lite dependencies
        working-directory: slide-flipper/pc-controller-lite
        run: npm install

      - name: Build Lite Windows binary
        working-directory: slide-flipper/pc-controller-lite
        run: npm run build:win

      - name: Upload Lite Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-lite
          path: slide-flipper/pc-controller-lite/dist/SlideFlipper-Lite-win-x64.exe
          if-no-files-found: error

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-mac-arm64, build-lite-mac-arm64, build-win, build-lite-win]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Mac arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-dmg-arm64
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-installer
          path: dist/

      - name: Download Lite Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-lite-arm64
          path: dist/

      - name: Download Lite Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: win-lite
          path: dist/

      - name: List release files
        run: ls -lh dist/

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'v1.0.0' }}
          name: "SlideFlipper ${{ github.ref_name || 'v1.0.0' }}"
          body: |
            ## SlideFlipper — PC Controller App

            Use your Amazfit Bip 6 as a wireless presentation remote.

            ### Download
            | Platform | File |
            |----------|------|
            | **Mac Full** (Apple Silicon) | `SlideFlipper-Mac-arm64.dmg` |
            | **Mac Lite** (Recommended) | `SlideFlipper-Lite-mac-arm64.zip` |
            | **Windows Full** (64-bit) | `SlideFlipper-Windows-x64.exe` |
            | **Windows Lite** (Recommended) | `SlideFlipper-Lite-win-x64.exe` |

            ### How to install
            1. Download the file for your platform above.
            2. **Lite** is smaller and faster to download, and is recommended for most users.
            3. **Mac Full**: Open the `.dmg`, drag SlideFlipper to Applications, double-click to run.
            4. **Mac Lite**: Unzip the file, then open `SlideFlipper-Lite-mac-arm64`.
            5. **Windows**: Run the `.exe` file you downloaded.
            6. The app runs silently in your menu bar / system tray.
            7. Click the icon to see your IP address, then enter it in the watch's **IP SETUP** screen.
          files: dist/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
